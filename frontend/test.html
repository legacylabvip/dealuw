<!DOCTYPE html>
<html>
<head>
    <title>DealUW Test</title>
    <style>
        body { background: #1a1a1a; color: #fff; font-family: sans-serif; padding: 2rem; }
        input, select { padding: 0.5rem; margin: 0.5rem 0; width: 100%; }
        button { padding: 1rem; background: #ffd700; color: #000; border: none; cursor: pointer; font-weight: bold; }
        #results { background: #333; padding: 2rem; margin-top: 2rem; display: none; }
        #results.active { display: block; }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
    </style>
</head>
<body>
    <h1>DealUW Quick Test</h1>
    
    <form id="testForm" onsubmit="handleTest(event)">
        <label>Address:</label>
        <input type="text" id="address" value="123 Main St, Nashville TN" required>
        
        <label>Square Footage:</label>
        <input type="number" id="squareFeet" value="2500" required>
        
        <label>Bedrooms:</label>
        <select id="bedrooms" required>
            <option value="">Select</option>
            <option value="3">3</option>
        </select>
        
        <label>Bathrooms:</label>
        <select id="bathrooms" required>
            <option value="">Select</option>
            <option value="2">2</option>
        </select>
        
        <button type="submit">Test Analyze</button>
    </form>
    
    <div id="results">
        <h2>Results</h2>
        <div id="resultContent"></div>
    </div>
    
    <div id="log"></div>
    
    <script>
        const API_URL = 'http://localhost:3001';
        const log = (msg, type = 'info') => {
            console.log(msg);
            const logDiv = document.getElementById('log');
            const p = document.createElement('p');
            p.textContent = msg;
            if (type === 'error') p.className = 'error';
            if (type === 'success') p.className = 'success';
            logDiv.appendChild(p);
        };
        
        async function handleTest(e) {
            e.preventDefault();
            log('🔵 Form submitted', 'success');
            
            const address = document.getElementById('address').value;
            const squareFeet = parseInt(document.getElementById('squareFeet').value);
            
            log('✓ Got form values');
            log('Fetching comps for: ' + address);
            
            try {
                // Show results section
                document.getElementById('results').classList.add('active');
                
                // Fetch comps
                const compsResp = await fetch(API_URL + '/api/property/comps', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address })
                });
                
                if (!compsResp.ok) throw new Error('Comps API failed: ' + compsResp.status);
                
                const compsData = await compsResp.json();
                log('✓ Got comps, ARV: $' + compsData.estimatedARV.toLocaleString(), 'success');
                
                // Calculate offers
                const offersResp = await fetch(API_URL + '/api/calculate/offer-analysis', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        arv: compsData.estimatedARV, 
                        repairs: squareFeet * 30,
                        dealType: 'cash'
                    })
                });
                
                if (!offersResp.ok) throw new Error('Offers API failed: ' + offersResp.status);
                
                const offersData = await offersResp.json();
                log('✓ Got offers', 'success');
                
                // Display results
                const fair = offersData.offers.fair;
                document.getElementById('resultContent').innerHTML = `
                    <p><strong>Address:</strong> ${address}</p>
                    <p><strong>ARV:</strong> $${compsData.estimatedARV.toLocaleString()}</p>
                    <p><strong>Fair Offer:</strong> $${fair.offerPrice.toLocaleString()}</p>
                    <p><strong>Assignment Fee:</strong> $${fair.assignmentFee.toLocaleString()}</p>
                    <p><strong>Your Profit:</strong> $${fair.profit.toLocaleString()}</p>
                `;
                
                log('✅ Results displayed!', 'success');
                
            } catch (error) {
                log('❌ ERROR: ' + error.message, 'error');
                console.error(error);
            }
        }
    </script>
</body>
</html>
